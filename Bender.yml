package:
  name: socratic/chassis
  authors:
    - Socratic contributors

dependencies:
  axi:
    git: https://github.com/pulp-platform/axi.git
    version: 0.38.0
  riscv-dbg:
    git: https://github.com/pulp-platform/riscv-dbg.git
    version: 0.10.0
  apb:
    git: https://github.com/pulp-platform/apb.git
    version: 0.2.4
  apb_uart:
    git: https://github.com/pulp-platform/apb_uart.git
    version: 0.2.3
  obi:
    git: https://github.com/pulp-platform/obi.git
    version: 0.1.7
  socratic_ibex:
    path: rtl/cores/socratic_ibex

sources:
  files:
    - rtl/pkg/chassis_pkg.sv
    - rtl/pkg/soc_bus_pkg.sv
    - rtl/interfaces/core_socket_if.sv
    - rtl/interfaces/accel_socket_if.sv
    - gen/rtl/addr_map_pkg.sv
    - rtl/top/soc_top.sv

    - target: fpga
      files:
        - rtl/cores/socratic_ibex/socratic_ibex_socket_adapter.sv
        - rtl/platform/fpga/soc_fpga.sv

    - target: all(fpga, axku5)
      files:
        - rtl/platform/fpga/boards/axku5/socratic_ibex_axku5_wrap.sv
